name: Proto CI

on:
  pull_request:
    paths:
      - 'contracts/proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'buf.lock'
  push:
    branches: [main]
    paths:
      - 'contracts/proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'buf.lock'

jobs:
  buf-lint:
    name: Buf Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.32.0'
      - name: Buf lint
        run: buf lint contracts/proto

  buf-breaking:
    name: Buf Breaking Change Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.32.0'
      - name: Buf breaking check against main
        run: buf breaking contracts/proto --against 'https://github.com/${{ github.repository }}.git#branch=main,subdir=contracts/proto' 2>&1 || true

  buf-format:
    name: Buf Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.32.0'
      - name: Buf format check
        run: buf format contracts/proto --diff --exit-code
