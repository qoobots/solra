# Solra CI/CD — GitHub Actions 全链路流水线
#
# 触发条件：push/PR 到 main/dev 分支
# 流程：Lint → Test → Build → Security Scan → Push Image → Deploy Dev

name: Solra CI/CD Pipeline

on:
  # TODO: 待项目需要 CI/CD 时启用
  # push:
  #   branches: [main, dev]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:  # 仅手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/solra

jobs:
  # =============================================================
  # 1. Lint & Static Analysis
  # =============================================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Gradle Lint
        run: ./gradlew ktlintCheck spotlessCheck --no-daemon

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python Lint
        run: |
          pip install ruff black
          ruff check ai-services/
          black --check ai-services/ --diff

      - name: CMake Lint
        run: |
          cmake --build core/build --target clang-tidy 2>/dev/null || echo "clang-tidy skip (no build yet)"

  # =============================================================
  # 2. Unit Tests
  # =============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: solra
          POSTGRES_PASSWORD: solra_test
          POSTGRES_DB: solra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Java Tests
        run: ./gradlew test --no-daemon -x integrationTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/solra_test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python Tests
        run: |
          pip install pytest pytest-asyncio pytest-cov
          for svc in llm-router embedding-service safety-model-service recommendation-pipeline tts-service gpu-scheduler; do
            echo "=== Testing ai-services/$svc ==="
            if [ -f "ai-services/$svc/pyproject.toml" ]; then
              cd ai-services/$svc && pip install -e . && pytest src/tests/ -v --tb=short || echo "WARN: $svc tests failed" && cd ../..
            else
              echo "SKIP: ai-services/$svc (no pyproject.toml)"
            fi
          done

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/junit.xml

  # =============================================================
  # 3. Security Scan
  # =============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: java,python,cpp

      - name: CodeQL Build
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

      - name: Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/kubernetes/
          exit-code: 0

  # =============================================================
  # 4. Build Docker Images (main branch only)
  # =============================================================
  build:
    name: Build & Push Images
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    needs: [test, security]
    strategy:
      matrix:
        service:
          # Java 微服务 (9 个)
          - { name: auth-service, dockerfile: infra/docker/Dockerfile.java, context: services/auth-service }
          - { name: saf-service, dockerfile: infra/docker/Dockerfile.java, context: services/saf-service }
          - { name: avt-service, dockerfile: infra/docker/Dockerfile.java, context: services/avt-service }
          - { name: spc-service, dockerfile: infra/docker/Dockerfile.java, context: services/spc-service }
          - { name: soc-service, dockerfile: infra/docker/Dockerfile.java, context: services/soc-service }
          - { name: grw-service, dockerfile: infra/docker/Dockerfile.java, context: services/grw-service }
          - { name: crt-service, dockerfile: infra/docker/Dockerfile.java, context: services/crt-service }
          - { name: not-service, dockerfile: infra/docker/Dockerfile.java, context: services/not-service }
          - { name: mon-service, dockerfile: infra/docker/Dockerfile.java, context: services/mon-service }
          # AI 服务 (6 个)
          - { name: llm-router, dockerfile: ai-services/llm-router/Dockerfile, context: ai-services/llm-router }
          - { name: embedding-service, dockerfile: ai-services/embedding-service/Dockerfile, context: ai-services/embedding-service }
          - { name: safety-model-service, dockerfile: ai-services/safety-model-service/Dockerfile, context: ai-services/safety-model-service }
          - { name: recommendation-pipeline, dockerfile: ai-services/recommendation-pipeline/Dockerfile, context: ai-services/recommendation-pipeline }
          - { name: tts-service, dockerfile: ai-services/tts-service/Dockerfile, context: ai-services/tts-service }
          - { name: gpu-scheduler, dockerfile: ai-services/gpu-scheduler/Dockerfile, context: ai-services/gpu-scheduler }

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================
  # 5. Deploy to Dev (main branch only)
  # =============================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    needs: build
    environment:
      name: dev
      url: https://dev.solra.app
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags
        run: |
          cd infra/kubernetes/helm/solra-services
          # Java 微服务
          for svc in auth-service saf-service avt-service spc-service soc-service grw-service crt-service not-service mon-service; do
            yq -i ".${svc}.image.tag = \"${{ github.sha }}\"" values.yaml
          done
          # AI 服务
          for aisvc in llm-router embedding-service safety-model-service recommendation-pipeline tts-service gpu-scheduler; do
            yq -i ".aiServices.\"${aisvc}\".image.tag = \"${{ github.sha }}\"" values.yaml
          done

      - name: Deploy with Helm
        run: |
          helm upgrade --install solra-services \
            infra/kubernetes/helm/solra-services/ \
            --namespace solra-dev \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set global.imageTag=${{ github.sha }}

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment -n solra-dev --timeout=5m
          kubectl get pods -n solra-dev

  # =============================================================
  # 6. Notify
  # =============================================================
  notify:
    name: Notify
    runs-on: ubuntu-24.04
    if: always()
    needs: [deploy-dev]
    steps:
      - name: Deployment Status
        run: |
          echo "CI/CD Pipeline completed: ${{ job.status }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
