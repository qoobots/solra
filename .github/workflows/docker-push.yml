# =============================================================
# CI: Docker Image Build & Push Pipeline (E-081)
# =============================================================
# 触发: main 分支合并后，构建多架构 Docker 镜像并推送到 registry
name: Docker Image Push

on:
  push:
    branches: [main]
    paths:
      - 'services/**/Dockerfile'
      - 'services/**/build.gradle.kts'
      - 'services/**/src/**'
      - 'ai-services/**/Dockerfile'
      - 'ai-services/**/pyproject.toml'
      - 'ai-services/**/src/**'
      - '.github/workflows/docker-push.yml'

concurrency:
  group: docker-push-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/solra

jobs:
  # ---------- Gather Changed Services ----------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services_matrix: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed service directories
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD | grep -oP '(services|ai-services)/[^/]+' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "services=$CHANGED" >> $GITHUB_OUTPUT

  # ---------- Build & Push ----------
  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.services_matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service_dir: ${{ fromJSON(needs.detect-changes.outputs.services_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract service name
        id: meta
        run: |
          SERVICE=$(echo "${{ matrix.service_dir }}" | sed 's|services/||;s|ai-services/||')
          echo "name=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=ghcr.io/${{ env.IMAGE_PREFIX }}/$SERVICE:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "tag_latest=ghcr.io/${{ env.IMAGE_PREFIX }}/$SERVICE:latest" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service_dir }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.tag_latest }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull ${{ steps.meta.outputs.tag_latest }}
          docker inspect ${{ steps.meta.outputs.tag_latest }}
