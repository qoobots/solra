# =============================================================
# CI: Client Build Pipeline (E-080)
# =============================================================
# 触发: clients/ 变更 → iOS(arm64) + Android(arm64-v8a) + Desktop(Windows) 构建
name: Client Build CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/**'
      - 'core/**'
      - 'contracts/proto/**'
      - '.github/workflows/client-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'clients/**'
      - 'core/**'
      - 'contracts/proto/**'
  workflow_dispatch:

concurrency:
  group: client-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Android ----------
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          target: 'android-34'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build Android APK
        run: |
          cd clients/android
          ./gradlew assembleRelease

      - name: Run Android Unit Tests
        run: |
          cd clients/android
          ./gradlew testReleaseUnitTest

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: clients/android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: clients/android/app/build/reports/tests/
          retention-days: 3

  # ---------- iOS ----------
  ios-build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Resolve SPM Dependencies
        run: |
          cd clients/ios
          xcodebuild -resolvePackageDependencies -scheme SolraApp

      - name: Build iOS (arm64, Simulator)
        run: |
          cd clients/ios
          xcodebuild \
            -scheme SolraApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run iOS Unit Tests
        run: |
          cd clients/ios
          xcodebuild \
            -scheme SolraApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            test \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:SolraAppTests

  # ---------- Windows Desktop (Tauri 2) ----------
  desktop-build:
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/desktop/package-lock.json

      - name: Install Web Dependencies
        run: |
          cd clients/desktop
          npm ci

      - name: Run Desktop Unit Tests (Vitest)
        run: |
          cd clients/desktop
          npm run test

      - name: Build Web UI
        run: |
          cd clients/desktop
          npm run build

      - name: Cache Rust Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('clients/desktop/src-tauri/Cargo.lock') }}

      - name: Build Desktop App (Windows)
        run: |
          cd clients/desktop
          npm run tauri build -- --debug

      - name: Run Rust Tests
        run: |
          cd clients/desktop/src-tauri
          cargo test

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          path: clients/desktop/src-tauri/target/debug/bundle/msi/*.msi
          retention-days: 7

      - name: Upload Vitest Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-reports
          path: clients/desktop/test-results/
          retention-days: 3

  # ---------- Web (lightweight) ----------
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/web/package-lock.json

      - name: Install Dependencies
        run: |
          cd clients/web
          npm ci

      - name: Lint
        run: |
          cd clients/web
          npm run lint

      - name: Type Check
        run: |
          cd clients/web
          npx vue-tsc --noEmit

      - name: Build Web
        run: |
          cd clients/web
          npm run build

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: clients/web/dist/
          retention-days: 7
