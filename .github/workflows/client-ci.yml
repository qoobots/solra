# =============================================================
# CI: Client Build Pipeline (E-080)
# =============================================================
# 触发: clients/ 变更 → iOS(arm64) + Android(arm64-v8a) 构建
name: Client Build CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/**'
      - 'core/**'
      - 'contracts/proto/**'
      - '.github/workflows/client-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'clients/**'
      - 'core/**'
      - 'contracts/proto/**'

concurrency:
  group: client-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Android ----------
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          target: 'android-34'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build Android APK
        run: |
          cd clients/android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: clients/android/app/build/outputs/apk/release/*.apk
          retention-days: 7

  # ---------- iOS ----------
  ios-build:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Resolve SPM Dependencies
        run: |
          cd clients/ios
          xcodebuild -resolvePackageDependencies -scheme SolraApp

      - name: Build iOS (arm64, Simulator fallback)
        run: |
          cd clients/ios
          xcodebuild \
            -scheme SolraApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
