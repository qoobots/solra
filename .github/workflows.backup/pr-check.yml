name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── lint 检查 ──
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown formatting
        run: |
          npx markdownlint-cli2 "**/*.md" --ignore node_modules --ignore .codebuddy 2>&1 || true

      - name: Check YAML formatting
        run: |
          npx prettier --check "**/*.{yml,yaml}" --ignore-path .gitignore 2>&1 || true

      - name: Check Kotlin DSL formatting (Gradle)
        run: |
          npx prettier --check "**/*.gradle.kts" --ignore-path .gitignore 2>&1 || true

  # ── services/ 编译检查 ──
  services-build:
    name: Services Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Compile services
        run: ./gradlew :services:common:compileJava :services:auth-service:compileJava :services:saf-service:compileJava :services:avt-service:compileJava :services:spc-service:compileJava --no-daemon

  # ── ai-services/ Python 检查 ──
  ai-services-check:
    name: AI Services Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tools
        run: pip install ruff mypy
      - name: Lint (ruff)
        run: ruff check ai-services/ 2>&1 || true
      - name: Type check (mypy)
        run: mypy ai-services/ --ignore-missing-imports 2>&1 || true

  # ── core/ C++ 静态检查 ──
  core-lint:
    name: Core C++ Lint
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format & clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy
      - name: clang-format check
        run: |
          find core/ -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | xargs clang-format --dry-run --Werror 2>&1 || true
      - name: clang-tidy basic check
        run: |
          find core/src -name '*.cpp' | head -5 | xargs clang-tidy -p core/build 2>&1 || true
