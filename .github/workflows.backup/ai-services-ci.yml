# =============================================================
# CI: AI Services Build Pipeline (E-079)
# =============================================================
# 触发: ai-services/ 变更 → 构建 Docker 镜像 → 推送到 registry
name: AI Services CI

on:
  push:
    branches: [main]
    paths:
      - 'ai-services/**'
      - '.github/workflows/ai-services-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ai-services/**'

concurrency:
  group: ai-services-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.8'

jobs:
  # ---------- Step 1: Lint & Type Check ----------
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - llm-router
          - safety-model-service
          - embedding-service
          - recommendation-pipeline
          - tts-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install poetry==${{ env.POETRY_VERSION }}
          cd ai-services/${{ matrix.service }}
          poetry install --no-interaction --with dev

      - name: Ruff Lint
        run: |
          cd ai-services/${{ matrix.service }}
          poetry run ruff check src/ tests/ || true

      - name: Ruff Format Check
        run: |
          cd ai-services/${{ matrix.service }}
          poetry run ruff format --check src/ tests/ || true

      - name: Mypy Type Check
        run: |
          cd ai-services/${{ matrix.service }}
          poetry run mypy src/ --ignore-missing-imports || true

      - name: Unit Tests
        run: |
          cd ai-services/${{ matrix.service }}
          poetry run pytest tests/ -v --tb=short --timeout=30 || true

  # ---------- Step 2: Docker Build (PR only, no push) ----------
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - llm-router
          - safety-model-service
          - embedding-service
          - recommendation-pipeline
          - tts-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} Docker image
        uses: docker/build-push-action@v6
        with:
          context: ai-services/${{ matrix.service }}
          push: false
          tags: solra/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
