# Auth Service — Development Profile
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/solra_auth
    username: ${POSTGRES_USER:solra}
    password: ${POSTGRES_PASSWORD:solra_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# gRPC
grpc:
  server:
    port: ${GRPC_PORT:9081}
    security:
      enabled: false  # TLS handled by API gateway in production

# JWT
solra:
  jwt:
    secret: ${JWT_SECRET:SolraDevSecretKeyAtLeast32Bytes!!}
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 2592000000  # 30 days

# Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: auth-service
      auto-offset-reset: earliest

solra:
  kafka:
    enabled: true

# Logging
logging:
  level:
    com.solra: DEBUG
    org.springframework.security: INFO
