spring:
  application:
    name: soc-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8091}

management:
  server:
    port: ${MANAGEMENT_PORT:9091}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,redis,webrtc
        liveness:
          include: livenessState
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: soc-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
