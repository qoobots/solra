spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/solra_avt
    username: solra
    password: solra_dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  redis:
    host: localhost
    port: 6379
    timeout: 3000ms
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: avt-service
      auto-offset-reset: earliest

grpc:
  server:
    port: 9092
  client:
    saf-service:
      address: static://localhost:9091
      negotiation-type: plaintext

logging:
  level:
    com.solra.avt: DEBUG
    org.springframework.security: INFO

# Mock engine configuration
avt:
  engine:
    mode: mock  # mock | ondevice | cloud
    ondevice:
      model-path: /models/slm-3b
    cloud:
      endpoint: http://localhost:8090/v1/chat/completions
