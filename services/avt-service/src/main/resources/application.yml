server:
  port: 8082

spring:
  application:
    name: avt-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/solra_avt
    username: ${DB_USER:solra}
    password: ${DB_PASSWORD:solra}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

grpc:
  server:
    port: 9082
  client:
    saf-service:
      address: static://${SAF_SERVICE_HOST:localhost}:9084
      negotiation-type: plaintext
    llm-router:
      address: static://${LLM_ROUTER_HOST:localhost}:9091
      negotiation-type: plaintext

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.solra.avt: ${LOG_LEVEL:INFO}
