spring:
  application:
    name: saf-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8084}

management:
  server:
    port: ${MANAGEMENT_PORT:9084}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: saf-service
  info:
    env:
      enabled: true
    git:
      mode: full

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
