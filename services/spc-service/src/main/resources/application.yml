server:
  port: 8083

spring:
  application:
    name: spc-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/solra_spc
    username: ${DB_USER:solra}
    password: ${DB_PASSWORD:solra}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

grpc:
  server:
    port: 9083
  client:
    recommendation-pipeline:
      address: static://${REC_PIPELINE_HOST:localhost}:9093
      negotiation-type: plaintext
    avt-service:
      address: static://${AVT_SERVICE_HOST:localhost}:9082
      negotiation-type: plaintext

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.solra.spc: ${LOG_LEVEL:INFO}
