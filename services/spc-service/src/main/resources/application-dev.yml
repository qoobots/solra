spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/solra_spc
    username: solra
    password: solra_dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  redis:
    host: localhost
    port: 6379
    timeout: 3000ms
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: spc-service

grpc:
  server:
    port: 9093
  client:
    auth-service:
      address: static://localhost:9090
      negotiation-type: plaintext

logging:
  level:
    com.solra.spc: DEBUG

spc:
  streaming:
    chunk-size-bytes: 65536
    max-concurrent-chunks: 4
    compression-enabled: true
  recommendation:
    engine-mode: mock  # mock | collaborative | deep-learning
