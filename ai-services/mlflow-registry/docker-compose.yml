# Solra MLflow Configuration
services:
  mlflow-server:
    image: bitnami/mlflow:2.15
    container_name: solra-mlflow
    ports:
      - "8104:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:mlflow@postgres-mlflow:5432/mlflow
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=s3://solra-mlflow
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_S3_IGNORE_TLS=true
    depends_on:
      - postgres-mlflow
      - minio
    restart: unless-stopped

  postgres-mlflow:
    image: postgres:16-alpine
    container_name: solra-mlflow-postgres
    environment:
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=mlflow
      - POSTGRES_DB=mlflow
    ports:
      - "5433:5432"
    volumes:
      - mlflow-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: solra-mlflow-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mlflow-minio:/data
    restart: unless-stopped

volumes:
  mlflow-pgdata:
  mlflow-minio:
