apiVersion: v2
name: auth-service
description: Solra 身份认证服务 Helm Chart
type: application
version: 0.1.0
appVersion: "0.1.0"

maintainers:
  - name: Solra Team

dependencies:
  - name: postgresql
    version: "15.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
