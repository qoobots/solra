version: v2
managed:
  enabled: false
plugins:
  # ── Java (Spring Boot gRPC) ──
  - remote: buf.build/protocolbuffers/java
    out: ../../services/generated
  - remote: buf.build/grpc/java
    out: ../../services/generated
  # ── Python (gRPC) ──
  - remote: buf.build/protocolbuffers/python
    out: ../../ai-services/generated
  - remote: buf.build/grpc/python
    out: ../../ai-services/generated
  # ── Kotlin (Android gRPC) ──
  - remote: buf.build/protocolbuffers/kotlin
    out: ../../clients/android/app/src/main/proto
  - remote: buf.build/grpc/kotlin
    out: ../../clients/android/app/src/main/proto
  # ── TypeScript (gRPC-Web) ──
  - remote: buf.build/protocolbuffers/js
    out: ../../clients/web/src/generated
    opt:
      - import_style=commonjs
  - remote: buf.build/grpc/web
    out: ../../clients/web/src/generated
    opt:
      - import_style=typescript
      - mode=grpcwebtext
  # ── C++17 (gRPC) ──
  - remote: buf.build/protocolbuffers/cpp
    out: ../../core/generated
  - remote: buf.build/grpc/cpp
    out: ../../core/generated
  # ── Swift (iOS gRPC) ──
  - remote: buf.build/apple/swift
    out: ../../clients/ios/SolraCore/Sources/Generated
    opt:
      - Visibility=Public
inputs:
  - directory: .
